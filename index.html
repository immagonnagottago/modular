<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MUD</title>
  <style>
    body { background: black; color: white; }
  </style>
</head>
<body>

<pre id="output"></pre>
<div id="prompt">&gt; <span id="cursor">_</span></div>

<script>
  const o = '<span style="color:#c47a3a">';
  const c = '</span>';

  const lines = [
    "The Wayward Flagon -- Upstairs Room",
    "",
    `Upstairs at the Wayward Flagon. The ${o}room${c} is small and plain --`,
    `a ${o}bed${c}, a ${o}desk${c}, a ${o}window${c}. The ${o}desk${c} has a ${o}candle${c}, an ${o}inkwell${c},`,
    `a ${o}cup${c}, and some ${o}parchment${c} on it. The ${o}door${c} to the hall is closed.`,
    "It smells of wood and tallow.",
    "",
  ];

  const output = document.getElementById("output");

  let i = 0;
  function printLine() {
    if (i < lines.length) {
      output.innerHTML += lines[i] + "\n";
      i++;
      setTimeout(printLine, 18);
    }
  }

  printLine();

  // Blinking cursor
  const cursor = document.getElementById("cursor");
  setInterval(() => {
    cursor.style.visibility = cursor.style.visibility === "hidden" ? "visible" : "hidden";
  }, 530);
</script>

</body>
</html>
