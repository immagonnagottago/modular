<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MUD</title>
  <style>
    body { background: black; color: white; }
  </style>
</head>
<body>

<pre id="output"></pre>
<div id="prompt">&gt; <span id="cursor">_</span></div>

<script>
  const lines = [
    "The Wayward Flagon -- Upstairs Room",
    "",
    "Upstairs at the Wayward Flagon. The room is small and plain --",
    "a bed, a desk, a window. The desk has a candle, an inkwell,",
    "a cup, and some parchment on it. The door to the hall is closed.",
    "It smells of wood and tallow.",
    "",
  ];

  const output = document.getElementById("output");

  let i = 0;
  function printLine() {
    if (i < lines.length) {
      output.textContent += lines[i] + "\n";
      i++;
      setTimeout(printLine, 18);
    }
  }

  printLine();

  // Blinking cursor
  const cursor = document.getElementById("cursor");
  setInterval(() => {
    cursor.style.visibility = cursor.style.visibility === "hidden" ? "visible" : "hidden";
  }, 530);
</script>

</body>
</html>
